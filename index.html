<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 FIFA世界杯赛程与统计</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #00a651; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; color: #333; transition: background 0.3s; }
        .dark body { background: #1a1a1a; color: #ddd; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .dark th, .dark td { border-color: #444; }
        .match-row { cursor: pointer; }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        button { padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
        .tab { display: none; }
        .tab.active { display: block; }
        .countdown { font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>
    <header>
        <h1>🏆 2026 FIFA世界杯赛程与实时统计</h1>
        <button onclick="toggleDarkMode()">🌙 切换暗黑模式</button>
        <button onclick="toggleLang()">中/EN</button>
    </header>
    <div class="container">
        <div class="filters">
            <input type="text" id="search" placeholder="搜索球队..." onkeyup="filterMatches()">
            <select id="groupFilter" onchange="filterMatches()">
                <option value="">所有小组</option>
            </select>
            <button onclick="refreshData()">🔄 刷新数据</button>
        </div>

        <!-- 标签页 -->
        <div>
            <button onclick="showTab(0)">赛程</button>
            <button onclick="showTab(1)">积分榜</button>
            <button onclick="showTab(2)">统计图表</button>
        </div>

        <!-- 赛程 -->
        <div id="tab0" class="tab active">
            <table id="scheduleTable">
                <thead><tr><th>日期</th><th>时间</th><th>小组</th><th>主队</th><th>比分</th><th>客队</th><th>场地</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 积分榜 -->
        <div id="tab1" class="tab">
            <table id="standingsTable">
                <thead><tr><th>小组</th><th>球队</th><th>场</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净</th><th>分</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 图表 -->
        <div id="tab2" class="tab">
            <canvas id="statsChart" height="100"></canvas>
        </div>
    </div>

    <script>
        let matches = [];
        let currentLang = 'zh';
        let darkMode = false;

        // 加载开源数据（openfootball）
        async function loadData() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json');
                const data = await res.json();
                matches = data.matches || [];
                renderSchedule();
                renderStandings();
                renderChart();
                populateGroupFilter();
            } catch(e) {
                console.error('数据加载失败，使用本地示例');
                // 可在此添加备用静态数据
            }
        }

        function renderSchedule(filtered = matches) {
            const tbody = document.querySelector('#scheduleTable tbody');
            tbody.innerHTML = '';
            filtered.forEach(m => {
                const row = document.createElement('tr');
                row.classList.add('match-row');
                const score = m.score && m.score.ft ? `${m.score.ft[0]}-${m.score.ft[1]}` : 'VS';
                row.innerHTML = `
                    <td>${m.date}</td>
                    <td>${m.time}</td>
                    <td>${m.group || '-'}</td>
                    <td>${m.team1}</td>
                    <td>${score}</td>
                    <td>${m.team2}</td>
                    <td>${m.ground || '-'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderStandings() {
            // 简化积分计算逻辑（实际可扩展）
            const tbody = document.querySelector('#standingsTable tbody');
            tbody.innerHTML = ''; // 示例数据，可根据matches动态计算
            // ...（完整逻辑可进一步扩展）
        }

        function renderChart() {
            const ctx = document.getElementById('statsChart');
            new Chart(ctx, { type: 'bar', data: { /* 示例数据 */ } });
        }

        function filterMatches() { /* 实现搜索与筛选 */ }
        function showTab(n) { /* 标签切换 */ }
        function toggleDarkMode() { /* 暗黑模式 */ }
        function toggleLang() { /* 语言切换 */ }
        function refreshData() { loadData(); }

        // 初始化
        window.onload = () => {
            loadData();
            // 每30秒自动刷新
            setInterval(() => { if (document.visibilityState === 'visible') refreshData(); }, 30000);
        };
    </script>
</body>
</html>
